version: '3.8'
services:
  # Postgres local pour les tests hors-ligne (banque de questions, comptes,
  # défi quotidien...) sans toucher au Neon de prod. Ignoré si DATABASE_URL
  # est déjà défini dans .env (pointe alors vers un Neon réel).
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=fsq
      - POSTGRES_PASSWORD=fsq
      - POSTGRES_DB=fsq
    ports:
      - "5432:5432"
    volumes:
      - fsq-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fsq"]
      interval: 2s
      timeout: 3s
      retries: 20

  ai-server:
    build: ./ai-server
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - AI_PROVIDER=stub
      - AI_MODEL=fsq-stub
      # Profile sync (optional, needed only for cross-device progress sync):
      # get these from an Upstash Redis database (free tier) at upstash.com.
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      # Question bank + comptes + paiements. Par défaut le Postgres local
      # ci-dessus ; mets DATABASE_URL dans .env pour pointer vers un vrai Neon.
      - DATABASE_URL=${DATABASE_URL:-postgresql://fsq:fsq@db:5432/fsq}
      # Pas de défaut ici volontairement (admin/JWT fermés tant que non
      # configurés) — pour des tests locaux avec ces routes ouvertes, voir
      # docker-compose.override.yml (ignoré par git, jamais un vrai secret).
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-}

  ai-server-ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    profiles: ["ollama"]
    restart: unless-stopped

  frontend:
    image: node:18
    working_dir: /workspace/harness
    volumes:
      - ./harness:/workspace/harness
      - /workspace/harness/node_modules
    command: sh -c "npm install --no-audit --no-fund --silent || true && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      # Must be reachable from the browser, not just the Docker network — use localhost.
      - VITE_AI_SERVER_URL=http://localhost:8000
      - VITE_AI_API_TOKEN=
    depends_on:
      - ai-server

volumes:
  fsq-db-data:

version: '3.8'
services:
  ai-server:
    build: ./ai-server
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - AI_PROVIDER=stub
      - AI_MODEL=fsq-stub
      # Profile sync (optional, needed only for cross-device progress sync):
      # get these from an Upstash Redis database (free tier) at upstash.com.
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      # Question bank (optional): Neon Postgres URL + admin key for the in-app admin view.
      - DATABASE_URL=${DATABASE_URL:-}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}

  ai-server-ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    profiles: ["ollama"]
    restart: unless-stopped

  frontend:
    image: node:18
    working_dir: /workspace/harness
    volumes:
      - ./harness:/workspace/harness
      - /workspace/harness/node_modules
    command: sh -c "npm install --no-audit --no-fund --silent || true && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      # Must be reachable from the browser, not just the Docker network — use localhost.
      - VITE_AI_SERVER_URL=http://localhost:8000
      - VITE_AI_API_TOKEN=
    depends_on:
      - ai-server
